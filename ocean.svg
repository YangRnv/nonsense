<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Ciel -->
  <rect width="200" height="110" fill="#aed6f1"/>

  <!-- Soleil levant -->
  <circle cx="100" cy="90" r="30" fill="#f9c74f" opacity="0.9"/>

  <!-- Reflet soleil sur l'eau -->
  <rect x="85" y="110" width="30" height="90" fill="#f9c74f" opacity="0.2"/>

  <!-- Mer (fond) -->
  <rect y="110" width="200" height="90" fill="#1a6b8a"/>

  <!-- Vagues -->
  <path d="M0,125 Q25,115 50,125 Q75,135 100,125 Q125,115 150,125 Q175,135 200,125 L200,145 Q175,155 150,145 Q125,135 100,145 Q75,155 50,145 Q25,135 0,145 Z" fill="#2196b5"/>
  <path d="M0,155 Q25,145 50,155 Q75,165 100,155 Q125,145 150,155 Q175,165 200,155 L200,200 L0,200 Z" fill="#0e4d6e"/>

  <!-- Petit bateau -->
  <polygon points="85,108 115,108 105,120 95,120" fill="white"/>
  <line x1="100" y1="90" x2="100" y2="108" stroke="#555" stroke-width="2"/>
  <polygon points="100,92 100,104 112,104" fill="#e74c3c"/>
</svg>
