<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Ciel -->
  <rect width="200" height="200" fill="#d0e8f2"/>

  <!-- Soleil -->
  <circle cx="160" cy="40" r="22" fill="#f9c74f"/>

  <!-- Montagne arrière (plus claire) -->
  <polygon points="60,160 130,50 200,160" fill="#8fada0"/>

  <!-- Montagne avant (plus foncée) -->
  <polygon points="0,160 80,40 160,160" fill="#2c4a3e"/>

  <!-- Neige -->
  <polygon points="80,40 68,75 92,75" fill="white"/>

  <!-- Sol -->
  <rect y="160" width="200" height="40" fill="#a8c5a0"/>
</svg>
